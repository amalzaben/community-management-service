spring.application.name=communityManagemnet
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/discuessit
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.default_schema=communitymanagement
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
logging.level.org.springframework.jdbc.datasource.init.ScriptUtils=DEBUG

# JSON formatting
spring.jackson.property-naming-strategy=SNAKE_CASE

# JWT
security.jwt.secret-key=${JWT_SECRET:oM8HqvU0pUo7dUjP9XjVgxW5Fh7nC8i2O2eS4yH6gKc=}
security.jwt.expiration-time=3600000

spring.security.user.name=core-user-name
spring.security.user.password=core-secret


user-management.base-url=${USER_MGMT_BASE_URL:http://localhost:8081}

